name: Release workbook

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for example v1.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Publish workbook assets
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
          else
            tag="$REF_NAME"
          fi

          if ! printf '%s\n' "$tag" | grep -Eq '^v[0-9]+(\.[0-9]+)*$'; then
            echo "::error::Release tag must be a final version like v1.2 or v1.2.3, got '$tag'. Prerelease suffixes are intentionally rejected so the stable latest-download asset never points at an RC or beta workbook."
            exit 1
          fi

          {
            echo "tag=$tag"
            echo "workbook=Personal Finance Tracker $tag.xlsx"
            echo "versioned_asset=Personal.Finance.Tracker.$tag.xlsx"
            echo "stable_asset=Personal.Finance.Tracker.xlsx"
          } >> "$GITHUB_OUTPUT"

      - name: Check out tagged source
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Prepare release assets
        env:
          WORKBOOK: ${{ steps.release.outputs.workbook }}
          VERSIONED_ASSET: ${{ steps.release.outputs.versioned_asset }}
          STABLE_ASSET: ${{ steps.release.outputs.stable_asset }}
        run: |
          set -euo pipefail

          if [ ! -f "$WORKBOOK" ]; then
            echo "::error file=$WORKBOOK::Expected workbook file is missing for this release tag."
            echo "Available workbook files:"
            find . -maxdepth 1 -type f -name 'Personal Finance Tracker v*.xlsx' -print | sort
            exit 1
          fi

          mkdir -p dist
          cp "$WORKBOOK" "dist/$VERSIONED_ASSET"
          cp "$WORKBOOK" "dist/$STABLE_ASSET"

          unzip -t "dist/$VERSIONED_ASSET"
          unzip -t "dist/$STABLE_ASSET"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSIONED_ASSET: ${{ steps.release.outputs.versioned_asset }}
          STABLE_ASSET: ${{ steps.release.outputs.stable_asset }}
        run: |
          set -euo pipefail

          title="Personal Finance Tracker $TAG"
          notes=$'Release assets:\n\n- `'"$VERSIONED_ASSET"$'` is the version-pinned workbook.\n- `'"$STABLE_ASSET"$'` is the stable latest-download alias used by README and blog links.'

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "dist/$VERSIONED_ASSET" "dist/$STABLE_ASSET" --clobber
            gh release edit "$TAG" --title "$title" --latest
          else
            gh release create "$TAG" "dist/$VERSIONED_ASSET" "dist/$STABLE_ASSET" \
              --title "$title" \
              --notes "$notes" \
              --latest \
              --verify-tag
          fi
